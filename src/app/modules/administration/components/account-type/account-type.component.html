<div class="expenses-container">
    <div class="modal-header">
        <h2>Account Type</h2>

        <mat-icon (click)="dialogRef.close()" class="close-icon">close</mat-icon>
    </div>

    <div class="modal-body" [formGroup]="accountTypeForm">
        <p>Enter the name</p>
        <mat-form-field appearance="outline">
            <input 
                matInput
                formControlName="name"
                placeholder="cash, bank, etc"
            />
        </mat-form-field>

        <p>Enter the description</p>
        <mat-form-field appearance="outline">
            <textarea 
                matInput
                formControlName="description"
                placeholder="Bank account, etc"
            ></textarea>
        </mat-form-field> 
    </div>
    
    <mat-divider></mat-divider>

    <div class="modal-footer">
        
        <div class="modal-actions">
            <button mat-raised-button color="secondary" (click)="dialogRef.close()">Cancel</button>
            <button mat-raised-button color="primary" (click)="saveAccountType()">Save</button>
        </div>
    </div>
</div>
