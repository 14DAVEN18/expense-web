<div class="expenses-container">
    <div class="modal-header">
        <h2>Currency</h2>

        <mat-icon (click)="dialogRef.close()" class="close-icon">close</mat-icon>
    </div>

    <div class="modal-body" [formGroup]="currencyForm">
        <p>Enter the code</p>
        <mat-form-field appearance="outline">
            <input 
                matInput
                formControlName="code"
            />
        </mat-form-field>

        <p>Enter the name</p>
        <mat-form-field appearance="outline">
            <input 
                matInput
                formControlName="name"
            />
        </mat-form-field>

        <p>Enter the symbol</p>
        <mat-form-field appearance="outline">
            <input 
                matInput
                formControlName="symbol"
            />
        </mat-form-field>


        <p>Enter the description</p>
        <mat-form-field appearance="outline">
            <textarea 
                matInput
                formControlName="description"
            ></textarea>
        </mat-form-field> 
    </div>
    
    <mat-divider></mat-divider>

    <div class="modal-footer">
        <div class="modal-actions">
            <button mat-raised-button color="secondary" (click)="dialogRef.close()">Cancel</button>
            <button mat-raised-button color="primary" (click)="saveCurrency()">{{ this.row ? 'Edit' : 'Save'}}</button>
        </div>
    </div>
</div>
