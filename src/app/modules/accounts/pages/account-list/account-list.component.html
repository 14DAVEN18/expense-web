<div class="account-list-container">
    <div class="header">
        <h1>Accounts</h1>

        <div class="actions">
            <button mat-mini-fab color="primary" (click)="openCreationModal('1000', '1000')">
                <mat-icon>add</mat-icon>
            </button>

            <button mat-mini-fab color="primary" (click)="exportCSV()">
                <mat-icon>download</mat-icon>
            </button>
        </div>
    </div>

    <div class="content">
        <our-table
            *ngIf="!isLoadingAccounts; else loading"
            [realColumnNames]="realColumnNames"
            [displayHeaders]="displayHeaders"
            [data]="data"
            [emptyDataColumnName]="shortColumns"
            [noDataColumn]="true"
        >
            <ng-template #cellTemplate let-element='element' let-column="column" let-index="index">
                <ng-container [ngSwitch]="column">
                    <ng-container *ngSwitchCase="'active'">
                        <div class="flag" [ngClass]="{'active-flag': element.active, 'inactive-flag': !element.active}"></div>
                    </ng-container>

                    <ng-container *ngSwitchCase="'currency'">
                        <span> {{ element.currency }} </span>
                    </ng-container>

                    <ng-container *ngSwitchCase="'created_at'">
                        <span> {{ element.created_at }} </span>
                    </ng-container>

                    <ng-container *ngSwitchCase="'name'">
                        <span> {{ element.name }} </span>
                    </ng-container>

                    <ng-container *ngSwitchCase="'description'">
                        <span> {{ element.description }} </span>
                    </ng-container>

                    <ng-container *ngSwitchCase="'initial_balance'">
                        <span> {{ element.initial_balance | currency: 'COP' : 'symbol-narrow':'1.2-2' }} </span>
                    </ng-container>

                    <ng-container *ngSwitchCase="'type'">
                        <span> {{ element.type }} </span>
                    </ng-container>
                    <ng-container *ngSwitchDefault> {{element[column]}} </ng-container>
                </ng-container>
            </ng-template>
        </our-table>

        <ng-template #loading>
            <div class="loading-message">
                CARGANDO CUENTAS...
            </div>
        </ng-template>
    </div>
</div>
