<div class="table-container">
    @if (data.length) {
        <table mat-table [dataSource]="dataSource">
            @for (column of realColumnNames; let i = $index; track column) {
                {{column | json }}
                <ng-container [matColumnDef]="column">
                    <!-- header -->
                    <mat-header-cell 
                        *matHeaderCellDef
                        mat-sort-header
                        class="mat-cell--styles"
                        [ngClass]="{'mat-header-cell-first': noDataColumn && emptyDataColumnName.includes(column)}"
                    >
                        {{ displayHeaders[i] | uppercase }}
                    </mat-header-cell>

                    <!-- Cell -->
                    <mat-cell 
                        *matCellDef="let element; let rowIndex = index"
                        class="mat-cell--styles"
                        [ngClass]="{'mat-header-cell-first': noDataColumn && emptyDataColumnName.includes(column)}"
                    >
                        <ng-container
                            *ngTemplateOutlet="cellTemplate; context: {element: element, column: column, index: rowIndex}">
                        </ng-container>
                    </mat-cell>
                </ng-container>    
            }
            <mat-header-row *matHeaderRowDef="realColumnNames"></mat-header-row>
            <mat-row *matRowDef="let row; let i = index; columns: realColumnNames;"></mat-row>
        </table>
    }
    @else {
        <div class="empty-message">
            <h1>THERE IS NO DATA TO DISPLAY</h1>
        </div>
    }
    
</div>

<ng-template #defaultCellTemplate let-element='element' let-column="column">
    {{element[column]}} 
</ng-template>
